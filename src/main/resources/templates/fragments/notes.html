<div id="notes-list" xmlns:th="http://www.thymeleaf.org" th:fragment="notesList" class="space-y-4">
    <div th:each="note : ${notes}" class="bg-white p-6 rounded shadow relative">
        <h4 class="text-xl font-bold" th:text="${note.title}">Note Title</h4>
        <p class="text-gray-600 text-sm mb-4" th:text="${note.createdAt}">Date</p>
        <p class="text-gray-800 whitespace-pre-wrap" th:text="${note.content}">Content</p>
        
        <button th:attr="hx-get=@{/dashboard/notes/{id}/edit(id=${note.id})}"
                hx-target="closest div" hx-swap="outerHTML"
                class="absolute top-4 right-20 text-indigo-500 hover:text-indigo-700 transition">
            Edit
        </button>
        <button th:attr="hx-delete=@{/dashboard/notes/{id}(id=${note.id})}"
                hx-target="#notes-list" hx-swap="outerHTML"
                class="absolute top-4 right-4 text-red-500 hover:text-red-700 transition">
            Delete
        </button>
    </div>
    <div th:if="${#lists.isEmpty(notes)}" class="text-gray-500">
        You have no notes yet.
    </div>
</div>

<div th:fragment="editForm" xmlns:th="http://www.thymeleaf.org" class="bg-indigo-50 p-6 rounded shadow relative border border-indigo-200">
    <form th:attr="hx-put=@{/dashboard/notes/{id}(id=${note.id})}" hx-target="#notes-list" hx-swap="outerHTML">
        <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="mb-4">
            <input type="text" name="title" th:value="${note.title}" required class="w-full border border-indigo-300 rounded px-3 py-2 mb-3 focus:outline-none focus:border-indigo-500" placeholder="Title"/>
            <textarea name="content" required rows="4" class="w-full border border-indigo-300 rounded px-3 py-2 focus:outline-none focus:border-indigo-500" placeholder="Content" th:text="${note.content}"></textarea>
        </div>
        <div class="flex space-x-2">
            <button type="submit" class="bg-indigo-600 text-white py-2 px-4 rounded hover:bg-indigo-700 transition">Save Changes</button>
            <button type="button" hx-get="/dashboard/notes/list" hx-target="#notes-list" hx-swap="outerHTML" class="bg-gray-400 text-white py-2 px-4 rounded hover:bg-gray-500 transition">Cancel</button>
        </div>
    </form>
</div>
