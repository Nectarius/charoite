<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<section>
    <h2 class="text-3xl font-bold mb-4">Your Notes Dashboard</h2>
    <div class="mb-8 bg-white p-6 rounded shadow">
        <h3 class="text-xl font-semibold mb-4">Create New Note</h3>
        <form hx-post="/dashboard/notes" hx-target="#notes-list" hx-swap="outerHTML">
            <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Title</label>
                <input type="text" name="title" required class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-indigo-500">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Content</label>
                <textarea name="content" required rows="4" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-indigo-500"></textarea>
            </div>
            <button type="submit" class="bg-indigo-600 text-white py-2 px-4 rounded hover:bg-indigo-700 transition">Save Note</button>
        </form>
    </div>
    
    <div id="notes-list" th:replace="~{fragments/notes :: notesList}"></div>
</section>
</html>
