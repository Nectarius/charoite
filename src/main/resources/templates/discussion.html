<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<section>
    <h2 class="text-3xl font-bold mb-4">Public Discussion</h2>
    
    <div th:if="${user != null}" class="mb-8 bg-white p-6 rounded shadow">
        <h3 class="text-xl font-semibold mb-4">Post a Comment</h3>
        <form hx-post="/discussion/comments" hx-target="#comments-list" hx-swap="outerHTML">
            <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="mb-4">
                <textarea name="text" required rows="3" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-indigo-500" placeholder="What's on your mind?"></textarea>
            </div>
            <button type="submit" class="bg-indigo-600 text-white py-2 px-4 rounded hover:bg-indigo-700 transition">Post</button>
        </form>
    </div>
    
    <div th:unless="${user != null}" class="mb-8 bg-yellow-100 border border-yellow-400 text-yellow-700 px-4 py-3 rounded relative">
        You must <a href="/login" class="font-bold underline">Login</a> to post a comment.
    </div>

    <div id="comments-list" th:replace="~{fragments/comments :: commentsList}"></div>
</section>
</html>
